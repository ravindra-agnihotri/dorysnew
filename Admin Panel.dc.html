<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#151008;color:#FDF6EC;font-family:'Jost',sans-serif;display:flex;min-height:100vh;}
    input,textarea,select{font-family:'Jost',sans-serif;}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#151008}::-webkit-scrollbar-thumb{background:#C4883A;border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeUp 0.22s ease both;}
    .navitem{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;font-size:13px;letter-spacing:0.04em;transition:all 0.18s;border-left:2px solid transparent;color:rgba(253,246,236,0.45);user-select:none;}
    .navitem:hover{color:rgba(253,246,236,0.8);background:rgba(196,136,58,0.05);}
    .navitem.active{color:#C4883A;background:rgba(196,136,58,0.09);border-left-color:#C4883A;}
    .inp{background:rgba(253,246,236,0.05);border:1px solid rgba(196,136,58,0.18);color:#FDF6EC;padding:12px 15px;font-size:14px;outline:none;width:100%;transition:border 0.2s;}
    .inp:focus{border-color:rgba(196,136,58,0.5);}
    .btn-g{background:#C4883A;color:#FDF6EC;border:none;padding:10px 22px;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:background 0.2s;}
    .btn-g:hover{background:#a0702e;}
    .btn-gh{background:rgba(196,136,58,0.09);color:rgba(253,246,236,0.6);border:1px solid rgba(196,136,58,0.2);padding:7px 16px;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;transition:all 0.2s;}
    .btn-gh:hover{background:rgba(196,136,58,0.15);color:#FDF6EC;}
    .btn-d{background:rgba(180,50,50,0.12);color:#e07070;border:1px solid rgba(180,50,50,0.22);padding:6px 13px;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;}
    .tag-ok{background:rgba(80,160,80,0.13);color:#7dc87d;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;padding:4px 10px;}
    .tag-pend{background:rgba(196,136,58,0.12);color:#C4883A;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;padding:4px 10px;}
    .loading{font-size:13px;color:rgba(253,246,236,0.28);font-style:italic;padding:40px 0;}
  </style>
</helmet>

<aside style="width:228px;min-height:100vh;background:#110D04;border-right:1px solid rgba(196,136,58,0.1);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;">
  <div style="padding:28px 22px 18px;border-bottom:1px solid rgba(196,136,58,0.09);">
    <p style="font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:#FDF6EC;line-height:1.1;">Dory's Bakes</p>
    <p style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#C4883A;margin-top:4px;">Admin Panel</p>
  </div>
  <nav style="flex:1;padding:10px 0;" id="sideNav"></nav>
  <div style="padding:12px 22px;border-top:1px solid rgba(196,136,58,0.09);">
    <div id="apiStatus" style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
      <span id="apiDot" style="width:6px;height:6px;border-radius:50%;background:rgba(253,246,236,0.2);flex-shrink:0;"></span>
      <span id="apiLabel" style="color:rgba(253,246,236,0.25);">Checking…</span>
    </div>
    <a href="Dorys Bakes.dc.html" style="font-size:11px;color:rgba(253,246,236,0.28);letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;display:flex;align-items:center;gap:8px;transition:color 0.2s;" onmouseover="this.style.color='#C4883A'" onmouseout="this.style.color='rgba(253,246,236,0.28)'">← View Website</a>
  </div>
</aside>

<main style="margin-left:228px;flex:1;padding:44px 52px;min-height:100vh;max-width:1100px;" id="mainContent"></main>
<div id="modalRoot"></div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tab:'dashboard', reviewFilter:'all' };
  _apiMode = null;

  async componentDidMount() {
    this.initDefaults();
    await this._checkApi();
    this._updateApiStatus();
    this.buildNav();
    this.renderTab();
  }

  // ── API / STORAGE LAYER ───────────────────────────────────
  async _checkApi() {
    if (this._apiMode !== null) return this._apiMode;
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 2000);
      const r = await fetch('/api/homepage', { signal: ctrl.signal });
      clearTimeout(tid);
      this._apiMode = r.ok;
    } catch(e) { this._apiMode = false; }
    return this._apiMode;
  }

  _updateApiStatus() {
    const dot = document.getElementById('apiDot');
    const lbl = document.getElementById('apiLabel');
    if (!dot || !lbl) return;
    if (this._apiMode) {
      dot.style.background = '#7dc87d';
      lbl.style.color = '#7dc87d';
      lbl.textContent = 'SQLite Connected';
    } else {
      dot.style.background = '#C4883A';
      lbl.style.color = 'rgba(196,136,58,0.7)';
      lbl.textContent = 'Offline (localStorage)';
    }
  }

  async listItems(key) {
    if (this._apiMode) {
      try { const r = await fetch('/api/'+key); if (r.ok) return r.json(); } catch(e) {}
    }
    try { return JSON.parse(localStorage.getItem('db_'+key)||'[]'); } catch(e) { return []; }
  }

  async getHomepage() {
    if (this._apiMode) {
      try { const r = await fetch('/api/homepage'); if (r.ok) return r.json(); } catch(e) {}
    }
    try { return JSON.parse(localStorage.getItem('db_homepage')||'{}'); } catch(e) { return {}; }
  }

  async createItem(key, data) {
    if (this._apiMode) {
      try {
        const r = await fetch('/api/'+key, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        if (r.ok) return r.json();
      } catch(e) {}
    }
    const arr = JSON.parse(localStorage.getItem('db_'+key)||'[]');
    const item = {...data, id: Date.now()};
    arr.push(item);
    localStorage.setItem('db_'+key, JSON.stringify(arr));
    return item;
  }

  async updateItem(key, id, data) {
    if (this._apiMode) {
      try {
        const r = await fetch('/api/'+key+'/'+id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        if (r.ok) return;
      } catch(e) {}
    }
    const arr = JSON.parse(localStorage.getItem('db_'+key)||'[]');
    const idx = arr.findIndex(x => x.id == id);
    if (idx >= 0) arr[idx] = {...data, id};
    localStorage.setItem('db_'+key, JSON.stringify(arr));
  }

  async deleteItem(key, id) {
    if (this._apiMode) {
      try {
        const r = await fetch('/api/'+key+'/'+id, {method:'DELETE'});
        if (r.ok) return;
      } catch(e) {}
    }
    const arr = JSON.parse(localStorage.getItem('db_'+key)||'[]');
    localStorage.setItem('db_'+key, JSON.stringify(arr.filter(x => x.id != id)));
  }

  async saveHomepage(data) {
    if (this._apiMode) {
      try {
        const r = await fetch('/api/homepage', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        if (r.ok) return;
      } catch(e) {}
    }
    localStorage.setItem('db_homepage', JSON.stringify(data));
  }

  // ── HELPERS ───────────────────────────────────────────────
  el(tag, css, html) {
    const e = document.createElement(tag);
    if (css) e.style.cssText = css;
    if (html) e.innerHTML = html;
    return e;
  }
  inp(type, val, ph) {
    const i = document.createElement('input');
    i.className='inp'; i.type=type; i.value=val||''; i.placeholder=ph||'';
    return i;
  }
  ta(val, ph, rows) {
    const t = document.createElement('textarea');
    t.className='inp'; t.rows=rows||3; t.placeholder=ph||''; t.value=val||''; t.style.resize='vertical';
    return t;
  }
  sel(options, val) {
    const s = document.createElement('select');
    s.className='inp'; s.style.background='#151008'; s.style.cursor='pointer';
    options.forEach(o => { const opt=document.createElement('option'); opt.value=o; opt.textContent=o; if(o===val) opt.selected=true; s.appendChild(opt); });
    return s;
  }
  fieldW(lbl, input) {
    const w = document.createElement('div');
    w.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
    const l = document.createElement('label');
    l.style.cssText = 'font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(253,246,236,0.38);';
    l.textContent = lbl; w.appendChild(l); w.appendChild(input);
    return w;
  }
  card(css) {
    const c = document.createElement('div');
    c.style.cssText = 'background:#1C1208;border:1px solid rgba(196,136,58,0.1);padding:24px;'+(css||'');
    return c;
  }
  secLabel(text) {
    const p = document.createElement('p');
    p.style.cssText = 'font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:#C4883A;margin-bottom:18px;';
    p.textContent = text; return p;
  }
  btn(label, cls, onclick) {
    const b = document.createElement('button');
    b.className=cls||'btn-g'; b.textContent=label;
    if (onclick) b.onclick = onclick;
    return b;
  }
  hdr(title, sub, btnLbl, btnCb) {
    const d = this.el('div','display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;');
    const l = this.el('div','');
    const h = document.createElement('h1');
    h.style.cssText = "font-family:'Cormorant Garamond',serif;font-size:34px;font-style:italic;font-weight:400;color:#FDF6EC;margin-bottom:4px;";
    h.textContent=title; l.appendChild(h);
    if (sub) { const p=document.createElement('p'); p.style.cssText='font-size:13px;color:rgba(253,246,236,0.38);'; p.textContent=sub; l.appendChild(p); }
    d.appendChild(l);
    if (btnLbl) d.appendChild(this.btn(btnLbl,'btn-g',btnCb));
    return d;
  }
  statCard(lbl, val, sub) {
    const c = this.card('padding:24px;');
    c.appendChild(this.secLabel(lbl));
    const v = document.createElement('p');
    v.style.cssText = "font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;color:#FDF6EC;line-height:1;";
    v.textContent=String(val); c.appendChild(v);
    if (sub) { const s=document.createElement('p'); s.style.cssText='font-size:12px;color:rgba(253,246,236,0.32);margin-top:8px;'; s.textContent=sub; c.appendChild(s); }
    return c;
  }
  modal(title, contentFn) {
    const root = document.getElementById('modalRoot');
    const ob = this.el('div','position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:400;display:flex;align-items:center;justify-content:center;');
    const mo = this.el('div','background:#1C1208;border:1px solid rgba(196,136,58,0.18);padding:40px;width:540px;max-height:88vh;overflow-y:auto;');
    const mh = this.el('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;');
    const ht = document.createElement('p');
    ht.style.cssText = "font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:#FDF6EC;";
    ht.textContent=title; mh.appendChild(ht);
    const cx = this.btn('×','',()=>ob.remove()); cx.style.cssText='background:none;border:none;color:rgba(253,246,236,0.4);font-size:30px;cursor:pointer;line-height:1;';
    mh.appendChild(cx); mo.appendChild(mh);
    contentFn(mo, ()=>ob.remove());
    ob.appendChild(mo);
    ob.onclick = e => { if(e.target===ob) ob.remove(); };
    root.innerHTML=''; root.appendChild(ob);
  }
  loading(m) {
    m.innerHTML='';
    const p = document.createElement('p');
    p.className='loading'; p.textContent='Loading…'; m.appendChild(p);
  }

  // ── INIT DEFAULTS ─────────────────────────────────────────
  initDefaults() {
    const defs = {
      db_products:[{id:1,name:"Duchess Rose",category:"Designer Cake",price:"$180",desc:"Four-layer vanilla bean cake, strawberry compote, Swiss meringue buttercream, edible rose petals.",image:""},{id:2,name:"Velvet Noir",category:"Designer Cake",price:"$195",desc:"Dark chocolate ganache cake with espresso cream, salted caramel drip, and gold leaf finish.",image:""},{id:3,name:"Lemon Reverie",category:"Cheesecake",price:"$95",desc:"Burnt Basque cheesecake with lemon curd swirl, graham cracker base, fresh blueberry compote.",image:""},{id:4,name:"Garden Party",category:"Cupcakes",price:"$48/doz",desc:"Vanilla sponge cupcakes with seasonal flower buttercream piping.",image:""},{id:5,name:"Midnight Truffle",category:"Designer Cake",price:"$220",desc:"Belgian dark chocolate mousse cake, hazelnut praline crunch, mirror glaze.",image:""},{id:6,name:"Peach Blossom",category:"Cheesecake",price:"$110",desc:"Classic New York cheesecake with roasted peach topping and almond shortbread crust.",image:""}],
      db_reviews:[{id:1,name:"Amelia R.",rating:5,text:"Dory's made our wedding cake and it was absolutely breathtaking. Every single guest asked for the recipe.",event:"Wedding",approved:true},{id:2,name:"James T.",rating:5,text:"The Velvet Noir is my birthday tradition now. Three years running. It gets better every single time.",event:"Birthday",approved:true},{id:3,name:"Sofia M.",rating:5,text:"Ordered the Garden Party cupcakes for my daughter's baby shower. The presentation was stunning.",event:"Baby Shower",approved:true},{id:4,name:"Priya K.",rating:4,text:"Beautiful cakes and wonderful service. The cheesecake was heavenly — will definitely order again!",event:"Anniversary",approved:false}],
      db_ingredients:[{id:1,name:"Single-Origin Flour",icon:"🌾",desc:"Stone-ground from a family mill in Vermont."},{id:2,name:"Cultured Butter",icon:"🧈",desc:"84% fat European-style butter, churned from pasture-raised cream."},{id:3,name:"Raw Cane Sugar",icon:"✦",desc:"Unrefined cane sugar that adds a subtle molasses depth."},{id:4,name:"Free-Range Eggs",icon:"🥚",desc:"Richer yolks mean a more golden, flavourful crumb."},{id:5,name:"Valrhona Chocolate",icon:"◆",desc:"Our preferred couverture for ganaches and mousses."},{id:6,name:"Real Vanilla",icon:"◇",desc:"Tahitian vanilla pods steeped in our house-made extract."}],
      db_videos:[{id:1,title:"Making the Duchess Rose",url:"",desc:"Watch a four-layer cake come together."},{id:2,title:"The Art of Mirror Glaze",url:"",desc:"A mesmerizing pour."}],
      db_faq:[{id:1,q:"How far in advance should I place my order?",a:"At least 2–3 weeks for custom cakes. For weddings, 2–3 months."},{id:2,q:"Do you offer gluten-free or vegan options?",a:"Yes — mention dietary needs in your order."},{id:3,q:"Can I schedule a tasting?",a:"By appointment Tuesdays and Thursdays."},{id:4,q:"How is pricing determined?",a:"Based on size, design, and ingredients. Quote within 24 hours."},{id:5,q:"Do you deliver?",a:"Within 20 miles. Collection available Tue–Sun."},{id:6,q:"How many people does a cake serve?",a:"6\" serves 10–12, 8\" serves 20–24, 10\" serves 35–40."}],
      db_media:[],db_orders:[],
      db_homepage:{tagline:"Artisan · Handcrafted · Bespoke",sub:"Where every cake tells a story — baked with love, crafted for your most special moments.",about1:"Dory's Bakes was born from a deep love of pastry and a desire to create something truly personal.",about2:"From towering designer layer cakes to delicate cheesecakes and seasonal cupcakes — we believe dessert should be an experience, not just an afterthought.",years:"5+",ribbonBg:"#2A1A0E",ribbonTextColor:"rgba(253,246,236,0.48)",ribbonAccentColor:"#C4883A",marqueeItems:"Designer Cakes,✦,Cheesecakes,✦,Cupcakes,✦,Custom Orders,✦,Bespoke Creations,✦,Made From Scratch",contactAddress:"123 Baker Street\nSweet City, SC 10001\n\nhello@dorysbakes.com\n+1 (555) 123 4567",instagramHandle:"@dorysbakes",instagramUrl:"https://instagram.com/dorysbakes"}
    };
    Object.entries(defs).forEach(([k,v])=>{ if(!localStorage.getItem(k)) localStorage.setItem(k,JSON.stringify(v)); });
  }

  /* ─── NAV ─── */
  buildNav() {
    const tabs=[
      {id:'dashboard',  label:'Dashboard',    icon:'M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z'},
      {id:'products',   label:'Products',     icon:'M8 2L2 6v8h12V6zM5 10h6M5 12h4'},
      {id:'media',      label:'Media Library',icon:'M1 3h14v10H1zM1 10l4-3 3 2 3-3 4 3'},
      {id:'videos',     label:'Videos',       icon:'M1 3h14v10H1zM6.5 6.5l5 3-5 3z'},
      {id:'ingredients',label:'Ingredients',  icon:'M8 1v14M4 5c0-2 8-2 8 0'},
      {id:'reviews',    label:'Reviews',      icon:'M2 4h12M2 8h9M2 12h6'},
      {id:'faq',        label:'FAQ',          icon:'M8 2a6 6 0 100 12A6 6 0 008 2zM8 10v.5M8 6a1.5 1.5 0 011.5 1.5c0 1-1.5 1.5-1.5 2.5'},
      {id:'orders',     label:'Orders',       icon:'M2 2h12v12H2zM5 5h6M5 8h6M5 11h3'},
      {id:'homepage',   label:'Homepage',     icon:'M1 8L8 1l7 7M3 8v7h4v-4h2v4h4V8'}
    ];
    const nav = document.getElementById('sideNav');
    nav.innerHTML='';
    tabs.forEach(t=>{
      const el=document.createElement('div');
      el.className='navitem'+(t.id===this.state.tab?' active':'');
      el.innerHTML=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="${t.icon}"/></svg>${t.label}`;
      el.onclick=()=>this.setState({tab:t.id},()=>{ this.buildNav(); this.renderTab(); });
      nav.appendChild(el);
    });
  }

  renderTab() {
    const m = document.getElementById('mainContent');
    m.className = 'fade';
    ({dashboard:()=>this.tDash(m),products:()=>this.tProducts(m),media:()=>this.tMedia(m),videos:()=>this.tVideos(m),ingredients:()=>this.tIngredients(m),reviews:()=>this.tReviews(m),faq:()=>this.tFaq(m),orders:()=>this.tOrders(m),homepage:()=>this.tHomepage(m)})[this.state.tab]();
  }

  /* ─── DASHBOARD ─── */
  async tDash(m) {
    this.loading(m);
    const [prods, revs, ords, media, faqs] = await Promise.all([
      this.listItems('products'), this.listItems('reviews'), this.listItems('orders'),
      this.listItems('media'), this.listItems('faq')
    ]);
    m.innerHTML='';
    const title = document.createElement('h1');
    title.style.cssText = "font-family:'Cormorant Garamond',serif;font-size:34px;font-style:italic;font-weight:400;color:#FDF6EC;margin-bottom:5px;";
    title.textContent='Good day ✦'; m.appendChild(title);
    const sub = document.createElement('p');
    sub.style.cssText='font-size:14px;color:rgba(253,246,236,0.38);margin-bottom:36px;';
    sub.textContent="Here's your bakery at a glance."; m.appendChild(sub);
    const sr = this.el('div','display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:32px;');
    sr.appendChild(this.statCard('Products',prods.length,'menu items'));
    sr.appendChild(this.statCard('Orders',ords.length,'custom requests'));
    sr.appendChild(this.statCard('Reviews',revs.length,revs.filter(r=>!r.approved).length+' pending'));
    sr.appendChild(this.statCard('FAQ Items',faqs.length,'published'));
    m.appendChild(sr);
    const g = this.el('div','display:grid;grid-template-columns:1fr 1fr;gap:22px;');
    const oc = this.card('padding:24px;');
    oc.appendChild(this.secLabel('Recent Orders'));
    const lastOrds = ords.slice(0,5);
    if (!lastOrds.length) { const ep=document.createElement('p'); ep.style.cssText='font-size:13px;color:rgba(253,246,236,0.28);font-style:italic;'; ep.textContent='No orders yet.'; oc.appendChild(ep); }
    lastOrds.forEach(o => {
      const r = this.el('div','padding:11px 0;border-bottom:1px solid rgba(253,246,236,0.05);');
      r.innerHTML=`<p style="font-size:14px;color:#FDF6EC;">${o.name}</p><p style="font-size:12px;color:rgba(253,246,236,0.35);margin-top:2px;">${o.cakeType||o.cake_type||''} · ${o.date}</p>`;
      oc.appendChild(r);
    });
    g.appendChild(oc);
    const rc = this.card('padding:24px;');
    rc.appendChild(this.secLabel('Pending Reviews'));
    const pend = revs.filter(r=>!r.approved);
    if (!pend.length) { const ep=document.createElement('p'); ep.style.cssText='font-size:13px;color:rgba(253,246,236,0.28);font-style:italic;'; ep.textContent='All reviews moderated.'; rc.appendChild(ep); }
    pend.forEach(r => {
      const row = this.el('div','padding:11px 0;border-bottom:1px solid rgba(253,246,236,0.05);');
      row.innerHTML=`<p style="font-size:14px;color:#FDF6EC;margin-bottom:3px;">${r.name}</p><p style="font-size:13px;color:rgba(253,246,236,0.42);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">"${r.text.substring(0,55)}…"</p>`;
      const ab = this.btn('Approve','btn-gh', async()=>{await this.updateItem('reviews',r.id,{...r,approved:true});this.renderTab();});
      ab.style.cssText+='margin-top:8px;padding:5px 14px;font-size:11px;';
      row.appendChild(ab); rc.appendChild(row);
    });
    g.appendChild(rc); m.appendChild(g);
  }

  /* ─── PRODUCTS ─── */
  async tProducts(m) {
    this.loading(m);
    const products = await this.listItems('products');
    m.innerHTML='';
    m.appendChild(this.hdr('Products','Manage your cake menu.','+ Add Product',()=>this.productModal()));
    const list = this.el('div','display:grid;gap:12px;');
    products.forEach(p => {

  processFiles(files) {
    let n=0;

      if (n >= files.length) { this.renderTab(); return; }
      const f = files[n++];
      const rd = new FileReader();
      rd.onload = async ev => {
        await this.createItem('media',{name:f.name,type:f.type.startsWith('video')?'video':'image',size:(f.size/1024).toFixed(0)+' KB',data:ev.target.result,addedAt:new Date().toLocaleDateString()});
        doNext();
      };
      rd.readAsDataURL(f);
    };
    doNext();
  }

      const db=this.btn('Dismiss','btn-d',async()=>{await this.deleteItem('orders',o.id);this.renderTab();});
      db.style.marginTop='16px';c.appendChild(db);list.appendChild(c);
    });
    m.appendChild(list);
  }

  /* ─── HOMEPAGE ─── */
  async tHomepage(m) {
    this.loading(m);
    const hp = await this.getHomepage();
    m.innerHTML='';
    m.appendChild(this.hdr('Homepage Content','Control every piece of text and style shown on the public website.'));
    const wrap=this.el('div','display:grid;gap:24px;max-width:720px;');

    const hCard=this.card('padding:28px;');
    hCard.appendChild(this.secLabel('Hero Section'));
    const tgI=this.inp('text',hp.tagline||'','e.g. Artisan · Handcrafted · Bespoke');
    const sbI=this.ta(hp.sub||'','Sub-headline below the main title',3);
    hCard.appendChild(this.fieldW('Tagline',tgI));hCard.appendChild(this.fieldW('Sub-headline',sbI));
    wrap.appendChild(hCard);

    const aCard=this.card('padding:28px;');
    aCard.appendChild(this.secLabel('About Section'));
    const a1I=this.ta(hp.about1||'','First paragraph',4);
    const a2I=this.ta(hp.about2||'','Second paragraph',4);
    const yrI=this.inp('text',hp.years||'5+','e.g. 5+');yrI.style.maxWidth='120px';
    aCard.appendChild(this.fieldW('Paragraph 1',a1I));aCard.appendChild(this.fieldW('Paragraph 2',a2I));aCard.appendChild(this.fieldW('Years Baking Badge',yrI));
    wrap.appendChild(aCard);

    const rCard=this.card('padding:28px;');
    rCard.appendChild(this.secLabel('Ribbon Strip'));
    const rbI=this.inp('color',hp.ribbonBg||'#2A1A0E','');rbI.style.cssText+='height:44px;padding:4px 8px;width:80px;';
    const rtI=this.inp('text',hp.ribbonTextColor||'rgba(253,246,236,0.48)','e.g. rgba(255,255,255,0.5)');
    const raI=this.inp('text',hp.ribbonAccentColor||'#C4883A','e.g. #C4883A');
    const mqI=this.ta(hp.marqueeItems||'','Comma-separated: Designer Cakes,✦,Cheesecakes,…',3);
    const g2r=this.el('div','display:grid;grid-template-columns:100px 1fr 1fr;gap:16px;align-items:end;');
    g2r.appendChild(this.fieldW('Bg Color',rbI));g2r.appendChild(this.fieldW('Text Color',rtI));g2r.appendChild(this.fieldW('Accent Color',raI));
    rCard.appendChild(g2r);rCard.appendChild(this.fieldW('Marquee Items (comma-separated)',mqI));
    wrap.appendChild(rCard);

    const igCard=this.card('padding:28px;');
    igCard.appendChild(this.secLabel('Instagram / Social'));
    const igHI=this.inp('text',hp.instagramHandle||'@dorysbakes','e.g. @dorysbakes');
    const igUI=this.inp('text',hp.instagramUrl||'','https://instagram.com/yourhandle');
    igCard.appendChild(this.fieldW('Instagram Handle',igHI));igCard.appendChild(this.fieldW('Instagram URL',igUI));
    const igTip=document.createElement('p');igTip.style.cssText='font-size:12px;color:rgba(253,246,236,0.28);margin-top:10px;font-style:italic;';igTip.textContent='The social grid uses your Media Library images. Upload photos there to populate it.';igCard.appendChild(igTip);
    wrap.appendChild(igCard);

    const cCard=this.card('padding:28px;');
    cCard.appendChild(this.secLabel('Contact & Footer'));
    const caI=this.ta(hp.contactAddress||'','Address, email and phone (each on a new line)',5);
    cCard.appendChild(this.fieldW('Address / Contact Info',caI));
    wrap.appendChild(cCard);

    const saved=this.el('div','display:none;padding:12px 20px;background:rgba(196,136,58,0.1);border:1px solid rgba(196,136,58,0.28);font-size:13px;color:#C4883A;','✦  Changes saved — reload the website to see them.');
    const sb=this.btn('Save All Changes','btn-g',async()=>{
      sb.textContent='Saving…';sb.disabled=true;
      await this.saveHomepage({tagline:tgI.value,sub:sbI.value,about1:a1I.value,about2:a2I.value,years:yrI.value,ribbonBg:rbI.value,ribbonTextColor:rtI.value,ribbonAccentColor:raI.value,marqueeItems:mqI.value,contactAddress:caI.value,instagramHandle:igHI.value,instagramUrl:igUI.value});
      sb.textContent='Save All Changes';sb.disabled=false;
      saved.style.display='block';setTimeout(()=>saved.style.display='none',4000);
    });
    sb.style.padding='14px 36px;';wrap.appendChild(sb);wrap.appendChild(saved);
    m.appendChild(wrap);
  }

  renderVals() { return {}; }
}

</script>
