<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tab: 'dashboard', reviewFilter: 'all' };
  _apiMode = null;

  async componentDidMount() {
    this.initDefaults();
    document.getElementById('loginBtn').onclick = () => this.doLogin();
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') this.doLogin(); });
    document.getElementById('logoutBtn').onclick = () => this.doLogout();
    if (sessionStorage.getItem('dory_admin') === '1') this.showAdmin();
  }

  doLogin() {
    const pass = document.getElementById('loginPass').value;
    const stored = localStorage.getItem('db_adminPassword') || 'dorys2025';
    if (pass === stored) {
      sessionStorage.setItem('dory_admin', '1');
      document.getElementById('loginErr').style.display = 'none';
      this.showAdmin();
    } else {
      const err = document.getElementById('loginErr');
      err.textContent = 'Incorrect password. Please try again.';
      err.style.display = 'block';
    }
  }

  doLogout() {
    sessionStorage.removeItem('dory_admin');
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginPass').value = '';
  }

  async showAdmin() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    await this._checkApi();
    this._updateApiStatus();
    // Pull latest data from API into localStorage before rendering
    // so the website immediately reflects any server-side changes
    await this.syncFromApi();
    this.buildNav();
    this.renderTab();
  }

  // ── API / STORAGE ─────────────────────────────────────────
  // Strategy: localStorage is the single source of truth.
  // Writes go to localStorage instantly (no wait), then sync to API in background.
  // API reads always write back to localStorage to keep it fresh.
  // This means: saves are instant, website always sees current data, no divergence.

  async _checkApi() {
    if (this._apiMode !== null) return this._apiMode;
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 4000); // was 2000 — cold starts need more time
      const r = await fetch('/api/homepage', { signal: ctrl.signal });
      clearTimeout(tid);
      this._apiMode = r.ok;
    } catch(e) { this._apiMode = false; }
    return this._apiMode;
  }

  // Pull all tables from API into localStorage on login — ensures website sees latest data
  async syncFromApi() {
    if (!this._apiMode) return;
    const keys = ['products','reviews','ingredients','videos','faq','media','orders','flavours'];
    await Promise.all([
      ...keys.map(async k => {
        try { const r=await fetch('/api/'+k); if(r.ok) localStorage.setItem('db_'+k, JSON.stringify(await r.json())); } catch(e){}
      }),
      (async()=>{
        try {
          const r=await fetch('/api/homepage'); if(!r.ok) return;
          const fresh=await r.json();
          const local=JSON.parse(localStorage.getItem('db_homepage')||'{}');
          localStorage.setItem('db_homepage', JSON.stringify({...local,...fresh}));
        } catch(e){}
      })()
    ]);
  }

  _updateApiStatus() {
    const dot = document.getElementById('apiDot');
    const lbl = document.getElementById('apiLabel');
    if (!dot || !lbl) return;
    if (this._apiMode) { dot.style.background='#7dc87d'; lbl.style.color='#7dc87d'; lbl.textContent='SQLite Connected'; }
    else { dot.style.background='#C4883A'; lbl.style.color='rgba(196,136,58,0.7)'; lbl.textContent='localStorage mode'; }
  }

  // Show a brief save confirmation toast
  toast(msg, ok=true) {
    let t=document.getElementById('__toast');
    if(!t){ t=document.createElement('div'); t.id='__toast';
      t.style.cssText='position:fixed;bottom:32px;right:32px;z-index:9999;padding:12px 22px;font-family:\'Jost\',sans-serif;font-size:13px;letter-spacing:0.06em;pointer-events:none;transition:opacity 0.35s;border:1px solid rgba(196,136,58,0.25);';
      document.body.appendChild(t); }
    t.textContent=msg;
    t.style.background=ok?'#1C1208':'rgba(80,20,20,0.95)';
    t.style.color=ok?'#7dc87d':'#e07070';
    t.style.opacity='1';
    clearTimeout(this._toastTimer);
    this._toastTimer=setTimeout(()=>{ t.style.opacity='0'; },2200);
  }

  // READ: fetch from API, write result to localStorage (keeps them in sync), return data
  async listItems(key) {
    let local=[];
    try { local=JSON.parse(localStorage.getItem('db_'+key)||'[]'); } catch(e){}
    if (this._apiMode) {
      try {
        const r=await fetch('/api/'+key);
        if(r.ok){ const fresh=await r.json(); localStorage.setItem('db_'+key,JSON.stringify(fresh)); return fresh; }
      } catch(e){}
    }
    return local;
  }

  async getHomepage() {
    let local={};
    try { local=JSON.parse(localStorage.getItem('db_homepage')||'{}'); } catch(e){}
    if (this._apiMode) {
      try {
        const r=await fetch('/api/homepage');
        if(r.ok){ const fresh=await r.json(); localStorage.setItem('db_homepage',JSON.stringify({...local,...fresh})); return fresh; }
      } catch(e){}
    }
    return local;
  }

  // WRITE: localStorage first (instant) → API in background → re-sync localStorage from API
  async createItem(key, data) {
    // 1. Write to localStorage immediately so website reflects change right away
    const arr=JSON.parse(localStorage.getItem('db_'+key)||'[]');
    const tempItem={...data, id:Date.now()};
    arr.push(tempItem);
    localStorage.setItem('db_'+key, JSON.stringify(arr));
    this.toast('Saved ✓');
    // 2. Persist to API in background; re-sync localStorage with server-assigned ID
    if (this._apiMode) {
      try {
        const r=await fetch('/api/'+key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        if(r.ok){
          const item=await r.json();
          // Re-fetch full list to get canonical server IDs
          const fresh=await fetch('/api/'+key);
          if(fresh.ok) localStorage.setItem('db_'+key, JSON.stringify(await fresh.json()));
          return item;
        }
      } catch(e){}
    }
    return tempItem;
  }

  async updateItem(key, id, data) {
    // 1. Optimistic write to localStorage
    const arr=JSON.parse(localStorage.getItem('db_'+key)||'[]');
    const idx=arr.findIndex(x=>x.id==id);
    if(idx>=0) arr[idx]={...data,id};
    localStorage.setItem('db_'+key, JSON.stringify(arr));
    this.toast('Saved ✓');
    // 2. Background API sync
    if (this._apiMode) {
      try { await fetch('/api/'+key+'/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); } catch(e){}
    }
  }

  async deleteItem(key, id) {
    // 1. Remove from localStorage immediately
    const arr=JSON.parse(localStorage.getItem('db_'+key)||'[]');
    localStorage.setItem('db_'+key, JSON.stringify(arr.filter(x=>x.id!=id)));
    this.toast('Deleted', true);
    // 2. Background API delete
    if (this._apiMode) {
      try { await fetch('/api/'+key+'/'+id,{method:'DELETE'}); } catch(e){}
    }
  }

  async saveHomepage(data) {
    // 1. Merge into localStorage immediately (website reads this instantly)
    const existing=JSON.parse(localStorage.getItem('db_homepage')||'{}');
    localStorage.setItem('db_homepage', JSON.stringify({...existing,...data}));
    this.toast('Saved ✓');
    // 2. Background API sync
    if (this._apiMode) {
      try { await fetch('/api/homepage',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); } catch(e){}
    }
  }

  // ── HELPERS ───────────────────────────────────────────────
  el(tag,css,html){const e=document.createElement(tag);if(css)e.style.cssText=css;if(html)e.innerHTML=html;return e;}
  inp(type,val,ph){const i=document.createElement('input');i.className='inp';i.type=type;i.value=val||'';i.placeholder=ph||'';return i;}
  ta(val,ph,rows){const t=document.createElement('textarea');t.className='inp';t.rows=rows||3;t.placeholder=ph||'';t.value=val||'';t.style.resize='vertical';return t;}
  sel(options,val){const s=document.createElement('select');s.className='inp';s.style.background='#151008';s.style.cursor='pointer';options.forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===val)opt.selected=true;s.appendChild(opt);});return s;}
  fieldW(lbl,input){const w=document.createElement('div');w.style.cssText='display:flex;flex-direction:column;gap:6px;';const l=document.createElement('label');l.style.cssText='font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(253,246,236,0.38);';l.textContent=lbl;w.appendChild(l);w.appendChild(input);return w;}
  card(css){const c=document.createElement('div');c.style.cssText='background:#1C1208;border:1px solid rgba(196,136,58,0.1);padding:24px;'+(css||'');return c;}
  secLabel(text){const p=document.createElement('p');p.style.cssText='font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:#C4883A;margin-bottom:18px;';p.textContent=text;return p;}
  btn(label,cls,onclick){const b=document.createElement('button');b.className=cls||'btn-g';b.textContent=label;if(onclick)b.onclick=onclick;return b;}
  hdr(title,sub,btnLbl,btnCb){const d=this.el('div','display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;');const l=this.el('div','');const h=document.createElement('h1');h.style.cssText="font-family:'Cormorant Garamond',serif;font-size:34px;font-style:italic;font-weight:400;color:#FDF6EC;margin-bottom:4px;";h.textContent=title;l.appendChild(h);if(sub){const p=document.createElement('p');p.style.cssText='font-size:13px;color:rgba(253,246,236,0.38);';p.textContent=sub;l.appendChild(p);}d.appendChild(l);if(btnLbl)d.appendChild(this.btn(btnLbl,'btn-g',btnCb));return d;}
  statCard(lbl,val,sub){const c=this.card('padding:24px;');c.appendChild(this.secLabel(lbl));const v=document.createElement('p');v.style.cssText="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;color:#FDF6EC;line-height:1;";v.textContent=String(val);c.appendChild(v);if(sub){const s=document.createElement('p');s.style.cssText='font-size:12px;color:rgba(253,246,236,0.32);margin-top:8px;';s.textContent=sub;c.appendChild(s);}return c;}
  modal(title,contentFn){const root=document.getElementById('modalRoot');const ob=this.el('div','position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:400;display:flex;align-items:center;justify-content:center;');const mo=this.el('div','background:#1C1208;border:1px solid rgba(196,136,58,0.18);padding:40px;width:540px;max-height:88vh;overflow-y:auto;');const mh=this.el('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;');const ht=document.createElement('p');ht.style.cssText="font-family:'Cormorant Garamond',serif;font-size:24px;font-style:italic;color:#FDF6EC;";ht.textContent=title;mh.appendChild(ht);const cx=this.btn('×','',()=>ob.remove());cx.style.cssText='background:none;border:none;color:rgba(253,246,236,0.4);font-size:30px;cursor:pointer;line-height:1;';mh.appendChild(cx);mo.appendChild(mh);contentFn(mo,()=>ob.remove());ob.appendChild(mo);ob.onclick=e=>{if(e.target===ob)ob.remove();};root.innerHTML='';root.appendChild(ob);}
  loading(m){m.innerHTML='';const p=document.createElement('p');p.className='loading';p.textContent='Loading…';m.appendChild(p);}

  processFiles(files) {
    let n=0;const doNext=async()=>{if(n>=files.length){this.renderTab();return;}const f=files[n++];const rd=new FileReader();rd.onload=async ev=>{await this.createItem('media',{name:f.name,type:f.type.startsWith('video')?'video':'image',size:(f.size/1024).toFixed(0)+' KB',data:ev.target.result,addedAt:new Date().toLocaleDateString()});doNext();};rd.readAsDataURL(f);};doNext();
  }

  /* ─── VIDEOS ─── */
  async tVideos(m) {
    this.loading(m);
    const videos = await this.listItems('videos');
    m.innerHTML = '';
    m.appendChild(this.hdr('Videos', 'Videos shown in the Studio section on the website.', null));

    // Action row: Upload file + Add URL
    const btnRow = this.el('div', 'display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;');
    const uplLabel = document.createElement('label');
    uplLabel.className = 'btn-g'; uplLabel.style.cursor = 'pointer'; uplLabel.textContent = '↑ Upload Video File';
    const fi = document.createElement('input'); fi.type = 'file'; fi.accept = 'video/*'; fi.style.display = 'none';

    fi.onchange = async e => {
      const f = e.target.files[0]; if (!f) return;
      if (f.size > 200 * 1024 * 1024) { this.toast('File too large — max 200 MB', false); fi.value = ''; return; }
      // Show uploading state
      uplLabel.textContent = '⏳ Uploading…'; uplLabel.style.opacity = '0.6'; uplLabel.style.pointerEvents = 'none';
      const statusEl = document.getElementById('__vidStatus');
      if (statusEl) { statusEl.textContent = 'Uploading ' + f.name + ' (' + (f.size/1024/1024).toFixed(1) + ' MB)…'; statusEl.style.color = '#C4883A'; }
      try {
        const resp = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'x-filename': f.name, 'content-type': f.type },
          body: f
        });
        if (!resp.ok) throw new Error('Server returned ' + resp.status);
        const { url } = await resp.json();
        const title = f.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
        await this.createItem('videos', { title, url, desc: '' });
        this.toast('Video uploaded ✓');
        this.renderTab();
      } catch (err) {
        this.toast('Upload failed — ' + (err.message || 'check server'), false);
        uplLabel.textContent = '↑ Upload Video File'; uplLabel.style.opacity = ''; uplLabel.style.pointerEvents = '';
        if (statusEl) { statusEl.textContent = '✗ Upload failed: ' + (err.message||'unknown error'); statusEl.style.color = '#e07070'; }
      }
      fi.value = '';
    };

  // Extract YouTube video ID from watch, embed, shorts or youtu.be URLs
  _ytId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

      const inp=this.inp('text',hp[key]||'',ph);
      shInputs[key]=inp;shCard.appendChild(this.fieldW(lbl,inp));
    });
    wrap.appendChild(shCard);

    // Footer
    const fCard=this.card('padding:28px;');fCard.appendChild(this.secLabel('Footer'));
    const ftI=this.ta(hp.footerTagline||'','Short tagline in footer',2);
    const fcI=this.inp('text',hp.footerCopyright||'© 2025 Dory\'s Bakes. All rights reserved.','Copyright line');
    const caI=this.ta(hp.contactAddress||'','Address, email and phone',5);
    fCard.appendChild(this.fieldW('Footer Tagline',ftI));fCard.appendChild(this.fieldW('Copyright',fcI));
    fCard.appendChild(this.fieldW('Address / Contact Info',caI));wrap.appendChild(fCard);

    // Ribbon
    const rCard=this.card('padding:28px;');rCard.appendChild(this.secLabel('Ribbon Strip'));
    const rbI=this.inp('color',hp.ribbonBg||'#2A1A0E','');rbI.style.cssText+='height:44px;padding:4px 8px;width:80px;';
    const rtI=this.inp('text',hp.ribbonTextColor||'rgba(253,246,236,0.48)','');
    const raI=this.inp('text',hp.ribbonAccentColor||'#C4883A','');
    const mqI=this.ta(hp.marqueeItems||'','Comma-separated: Designer Cakes,✦,…',3);
    const g2r=this.el('div','display:grid;grid-template-columns:100px 1fr 1fr;gap:16px;align-items:end;');
    g2r.appendChild(this.fieldW('Bg Colour',rbI));g2r.appendChild(this.fieldW('Text Colour',rtI));g2r.appendChild(this.fieldW('Accent Colour',raI));
    rCard.appendChild(g2r);rCard.appendChild(this.fieldW('Marquee Items (comma-separated)',mqI));wrap.appendChild(rCard);

    // Instagram
    const igCard=this.card('padding:28px;');igCard.appendChild(this.secLabel('Instagram / Social'));
    const igHI=this.inp('text',hp.instagramHandle||'@dorysbakes','e.g. @dorysbakes');
    const igUI=this.inp('text',hp.instagramUrl||'','https://instagram.com/yourhandle');
    igCard.appendChild(this.fieldW('Instagram Handle',igHI));igCard.appendChild(this.fieldW('Instagram URL',igUI));wrap.appendChild(igCard);

    const saved=this.el('div','display:none;padding:12px 20px;background:rgba(196,136,58,0.1);border:1px solid rgba(196,136,58,0.28);font-size:13px;color:#C4883A;','✦  Saved — reload the website to see changes.');
    const sb=this.btn('Save All Changes','btn-g',async()=>{
      sb.textContent='Saving…';sb.disabled=true;
      const hp2=await this.getHomepage();
      const shVals={};fields.forEach(([,key])=>{shVals[key]=shInputs[key].value;});
      await this.saveHomepage({...hp2,
        brandName:bnI.value,brandSubtitle:bsI.value,
        tagline:tgI.value,sub:sbI.value,
        aboutTagLabel:atI.value,aboutHeading:ahI.value,
        about1:a1I.value,about2:a2I.value,years:yrI.value,yearsLabel:ylI.value,
        aboutPhoto:aboutPhotoData,
        ...shVals,
        footerTagline:ftI.value,footerCopyright:fcI.value,contactAddress:caI.value,
        ribbonBg:rbI.value,ribbonTextColor:rtI.value,ribbonAccentColor:raI.value,marqueeItems:mqI.value,
        instagramHandle:igHI.value,instagramUrl:igUI.value,
      });
      sb.textContent='Save All Changes';sb.disabled=false;saved.style.display='block';setTimeout(()=>saved.style.display='none',4000);
    });
    sb.style.cssText+='padding:14px 36px;';wrap.appendChild(sb);wrap.appendChild(saved);m.appendChild(wrap);
  }

  /* ─── SETTINGS ─── */
  async tSettings(m) {
    this.loading(m);const hp=await this.getHomepage();m.innerHTML='';
    m.appendChild(this.hdr('Settings','Website appearance, WhatsApp integration, and security.'));
    const wrap=this.el('div','display:grid;gap:24px;max-width:720px;');

    // Appearance
    const appCard=this.card('padding:28px;');appCard.appendChild(this.secLabel('Website Colours'));
    const g3=this.el('div','display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;');
    const accentI=this.inp('color',hp.accentColor||'#C4883A','');accentI.style.cssText+='height:44px;padding:4px 8px;';
    const darkI=this.inp('color',hp.darkColor||'#2A1A0E','');darkI.style.cssText+='height:44px;padding:4px 8px;';
    const bgI=this.inp('color',hp.bgColor||'#FDF6EC','');bgI.style.cssText+='height:44px;padding:4px 8px;';
    g3.appendChild(this.fieldW('Accent / Brand Colour',accentI));g3.appendChild(this.fieldW('Dark Colour',darkI));g3.appendChild(this.fieldW('Background Colour',bgI));
    appCard.appendChild(g3);
    const colTip=this.el('p','font-size:11px;color:rgba(253,246,236,0.28);margin-bottom:22px;line-height:1.6;');colTip.textContent='Accent updates CTAs, labels and highlights. Background applies to the main site body.';appCard.appendChild(colTip);
    appCard.appendChild(this.secLabel('Font Pairing'));
    const fontPairs=[{id:'classic',label:'Classic',desc:'Cormorant Garamond + Jost'},{id:'modern',label:'Modern',desc:'Playfair Display + DM Sans'},{id:'elegant',label:'Elegant',desc:'Libre Baskerville + Lato'}];
    const fontGrid=this.el('div','display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;');
    let selFont=hp.fontPair||'classic';const fontBtns={};
    fontPairs.forEach(fp=>{
      const b=this.el('div',`padding:16px;border:1px solid ${fp.id===selFont?'#C4883A':'rgba(196,136,58,0.18)'};cursor:pointer;transition:border 0.2s;background:${fp.id===selFont?'rgba(196,136,58,0.08)':''};`);
      b.innerHTML=`<p style="font-size:13px;color:#FDF6EC;margin-bottom:4px;">${fp.label}</p><p style="font-size:11px;color:rgba(253,246,236,0.35);">${fp.desc}</p>`;
      b.onclick=()=>{selFont=fp.id;Object.entries(fontBtns).forEach(([id,btn])=>{btn.style.borderColor=id===fp.id?'#C4883A':'rgba(196,136,58,0.18)';btn.style.background=id===fp.id?'rgba(196,136,58,0.08)':'';});};
      fontBtns[fp.id]=b;fontGrid.appendChild(b);
    });appCard.appendChild(fontGrid);wrap.appendChild(appCard);

    // WhatsApp
    const waCard=this.card('padding:28px;');waCard.appendChild(this.secLabel('WhatsApp Integration'));
    const waNumI=this.inp('text',hp.whatsappNumber||'','e.g. 447911123456 (country code, no +)');
    const waMsgI=this.ta(hp.whatsappMessage||'','Message template…',6);
    const waHelper=this.el('p','font-size:11px;color:rgba(253,246,236,0.3);margin-top:6px;line-height:1.7;');
    waHelper.innerHTML='Placeholders: <span style="color:rgba(196,136,58,0.6)">{name}&nbsp; {email}&nbsp; {date}&nbsp; {cakeType}&nbsp; {notes}</span>';
    const waPreview=this.el('div','margin-top:16px;padding:12px 16px;background:rgba(196,136,58,0.07);border:1px solid rgba(196,136,58,0.15);');
    const updatePreview=()=>{const phone=(waNumI.value||'').replace(/[^0-9]/g,'');if(phone){waPreview.innerHTML=`<p style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(253,246,236,0.3);margin-bottom:6px;">WhatsApp Link</p><a href="https://wa.me/${phone}" target="_blank" rel="noopener" style="font-size:12px;color:#C4883A;word-break:break-all;">https://wa.me/${phone}</a>`;}else{waPreview.innerHTML='<p style="font-size:12px;color:rgba(253,246,236,0.25);font-style:italic;">Enter a phone number above to see the preview link</p>';}};
    waNumI.oninput=updatePreview;updatePreview();
    waCard.appendChild(this.fieldW('WhatsApp Phone Number',waNumI));waCard.appendChild(this.fieldW('Message Template',waMsgI));waCard.appendChild(waHelper);waCard.appendChild(waPreview);wrap.appendChild(waCard);

    // Hours
    const hoursCard=this.card('padding:28px;');hoursCard.appendChild(this.secLabel('Working Hours'));
    const hoursI=this.ta(hp.workingHours||'Tuesday – Friday\n9am – 6pm\n\nSaturday – Sunday\n9am – 4pm','e.g. Mon–Fri: 9am–6pm',5);
    const hoursTip=this.el('p','font-size:11px;color:rgba(253,246,236,0.28);margin-top:8px;line-height:1.6;');hoursTip.textContent='Free text — use line breaks to format. Shown in the website footer.';
    hoursCard.appendChild(this.fieldW('Open Days & Hours',hoursI));hoursCard.appendChild(hoursTip);wrap.appendChild(hoursCard);

    const savedMsg=this.el('div','display:none;padding:12px 20px;background:rgba(196,136,58,0.1);border:1px solid rgba(196,136,58,0.28);font-size:13px;color:#C4883A;','✦  Settings saved — reload the website to apply colour and font changes.');
    const saveBtn=this.btn('Save Settings','btn-g',async()=>{
      saveBtn.textContent='Saving…';saveBtn.disabled=true;
      const hp2=await this.getHomepage();
      await this.saveHomepage({...hp2,accentColor:accentI.value,darkColor:darkI.value,bgColor:bgI.value,fontPair:selFont,whatsappNumber:waNumI.value,whatsappMessage:waMsgI.value,workingHours:hoursI.value});
      saveBtn.textContent='Save Settings';saveBtn.disabled=false;savedMsg.style.display='block';setTimeout(()=>savedMsg.style.display='none',4000);
    });
    saveBtn.style.cssText+='padding:14px 36px;';wrap.appendChild(saveBtn);wrap.appendChild(savedMsg);

    // Security
    const secCard=this.card('padding:28px;margin-top:4px;');secCard.appendChild(this.secLabel('Change Admin Password'));
    const newPI=this.inp('password','','New password (min 4 characters)');const conPI=this.inp('password','','Confirm new password');
    const passErr=this.el('p','display:none;font-size:12px;color:#e07070;font-style:italic;margin-top:6px;');
    const passOk=this.el('p','display:none;font-size:12px;color:#7dc87d;font-style:italic;margin-top:6px;','✓  Password updated successfully.');
    const g2p=this.el('div','display:grid;grid-template-columns:1fr 1fr;gap:16px;');g2p.appendChild(this.fieldW('New Password',newPI));g2p.appendChild(this.fieldW('Confirm',conPI));
    const passBtn=this.btn('Update Password','btn-gh',()=>{
      if(!newPI.value||newPI.value.length<4){passErr.textContent='Must be at least 4 characters.';passErr.style.display='block';return;}
      if(newPI.value!==conPI.value){passErr.textContent='Passwords do not match.';passErr.style.display='block';return;}
      localStorage.setItem('db_adminPassword',newPI.value);passErr.style.display='none';passOk.style.display='block';newPI.value='';conPI.value='';setTimeout(()=>passOk.style.display='none',4000);
    });
    secCard.appendChild(g2p);secCard.appendChild(passErr);secCard.appendChild(passOk);secCard.appendChild(passBtn);wrap.appendChild(secCard);
    m.appendChild(wrap);
  }

  renderVals() { return {}; }
}
</script>
